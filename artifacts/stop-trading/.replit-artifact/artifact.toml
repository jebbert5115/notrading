kind = "web"
previewPath = "/"
title = "You Cannot Trade Here"
version = "1.0.0"
id = "artifacts/stop-trading"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 26006

[services.development]
run = "pnpm --filter @workspace/stop-trading run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/stop-trading", "run", "build" ]
publicDir = "artifacts/stop-trading/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "26006"
BASE_PATH = "/"
